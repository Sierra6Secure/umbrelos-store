manifestVersion: 1
id: sierra6-nerd-watcher
name: Nerd Watcher
tagline: Real-time dashboard for your Bitcoin mining swarm.
icon: https://raw.githubusercontent.com/Sierra6Secure/umbrelos-store/main/sierra6-nerd-watcher/img/icon.png
category: utility
version: "1.4.0"
port: 5005
description: >-
  Nerd Watcher is a real-time swarm dashboard for solo Bitcoin miners running
  NerdMiner, BitAxe, or any device on AxeOS firmware. Built for the scrappy,
  determined miner who knows the odds — and mines anyway.


  Point it at your local network, add miners by IP, and get a live window into
  your entire operation. Every device reports: hashrate, chip temperature,
  core voltage, clock frequency, and active pool connection.


  KEY FEATURES

  ◆ Swarm Overview — monitor unlimited miners from a single dashboard, sorted
  by IP, name, hashrate, or online status.


  ◆ Live Block Activity Canvas — a real-time visual grid that fills as your
  miners find shares. Each miner gets its own color-coded canvas, animating
  in real time as shares land. Watch your swarm work the block.


  ◆ Hardware Telemetry — track hashrate, ASIC temp, VR temp, core voltage, and
  clock frequency per device.


  ◆ Network Stats — live Bitcoin price, current network difficulty, and block
  reward displayed in the nav bar at all times.


  ◆ Pool Status — per-miner pool connection indicator so you know exactly
  who's working and who's drifted offline.


  ◆ Zero Config on Umbrel — connects to your Bitcoin Node automatically.
  Manual RPC configuration available for non-Umbrel installs.


  Solo mining is a lottery. Nerd Watcher makes sure you never miss your ticket.

developer: Sierra6
website: https://github.com/Sierra6Secure/umbrelos-store
submitter: Sierra6
submission: 2026-03-04
repo: https://github.com/Sierra6Secure/umbrelos-store
support: https://github.com/Sierra6Secure/umbrelos-store/issues
gallery:
  - https://raw.githubusercontent.com/Sierra6Secure/umbrelos-store/main/sierra6-nerd-watcher/img/1.png
  - https://raw.githubusercontent.com/Sierra6Secure/umbrelos-store/main/sierra6-nerd-watcher/img/2.png
releaseNotes: >-
### Fixed
- Race conditions causing miners to flash offline and block share counts
  to reset incorrectly under concurrent request/poll load

- Canvas shares not appearing until page refresh — animateLanding() was
  targeting the wrong DOM cell when a new row was not needed

- Miner added via UI would leave stale baseline/state on removal,
  causing incorrect share counts if re-added in the same block


### Added
- Block age display ("Xm ago") next to block number in Block Activity panel

- Mid-block share estimation for newly added miners — shows ~N shares in
  amber based on lifetime share rate; falls back to Syncing if uptime < 60s


### Improved
- Telemetry (Bitcoin RPC + price) moved to background thread; UI endpoint
  now reads from cache instantly instead of blocking on network I/O

- Swarm poller now polls all miners in parallel — one offline miner no
  longer stalls the rest of the fleet

- RPC config cached in memory; eliminates disk read every 3 seconds

- Canvas update path simplified — always rebuilds from state before flash

- Config endpoint refactored to single file read per request

widgets:
  - id: "swarm"
    type: "four-stats"
    refresh: "5s"
    endpoint: "app:5005/api/widget/swarm"
    link: ""
    example:
      type: "four-stats"
      link: ""
      items:
        - title: "Miners Online"
          text: "8"
          subtext: "of 9"
        - title: "Swarm Hashrate"
          text: "28.50"
          subtext: "TH/s"
        - title: "Swarm Shares"
          text: "1,204"
          subtext: "(12) 0.99%"
        - title: "Block Height"
          text: "888,142"
          subtext: "current block"
dependencies:
  - bitcoin
path: ""
defaultUsername: ""
defaultPassword: ""
