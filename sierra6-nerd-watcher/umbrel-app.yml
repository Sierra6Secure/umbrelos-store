manifestVersion: 1

id: sierra6-nerd-watcher
name: Nerd Watcher
tagline: Real-time monitoring for your NerdMiners
icon: https://raw.githubusercontent.com/Sierra6Secure/umbrelos-store/main/sierra6-nerd-watcher/img/icon.png
category: utility
version: "0.0.1"
port: 5005
description: >-
  Nerd Watcher is a modern, high-tech dashboard designed specifically for 
  monitoring Bitcoin NerdMiners and other small-scale ASIC devices on your 
  local network. 

  Add miners by IP address to track real-time hash rates, chip temperatures, 
  voltages, and clock frequencies. The app features a visual job-feed 
  display, allowing you to see the actual work your hardware is performing 
  on the blockchain in real-time.
