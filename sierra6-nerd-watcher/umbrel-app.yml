manifestVersion: 1
id: sierra6-nerd-watcher
name: Nerd Watcher
tagline: Mission control for your Bitcoin mining swarm
icon: https://raw.githubusercontent.com/Sierra6Secure/umbrelos-store/main/sierra6-nerd-watcher/img/icon.png
category: utility
version: "1.1.0"
port: 5005
description: >-
  Nerd Watcher is a real-time swarm dashboard for solo Bitcoin miners running
  NerdMiner, BitAxe, or any device on AxeOS firmware. Built for the scrappy,
  determined miner who knows the odds — and mines anyway.


  Point it at your local network, add miners by IP, and get a live window into
  your entire operation. Every device reports: hashrate, chip temperature,
  core voltage, clock frequency, and active pool connection.


  KEY FEATURES

  ◆ Swarm Overview — monitor unlimited miners from a single dashboard, sorted
  by IP, name, hashrate, or online status.


  ◆ Live Block Activity Canvas — a real-time visual grid that fills as your
  devices find shares, giving you an at-a-glance pulse of your whole swarm.


  ◆ Hardware Telemetry — track hashrate, ASIC temp, VR temp, core voltage, and
  clock frequency per device, with color-coded alerts for anything running hot.


  ◆ Network Stats — live Bitcoin price, current network difficulty, and block
  reward displayed in the nav bar at all times.


  ◆ Pool Status — per-miner pool connection indicator so you know exactly
  who's working and who's drifted offline.


  ◆ Zero Config on Umbrel — connects to your Bitcoin Node automatically.
  Manual RPC configuration available for non-Umbrel installs.


  Solo mining is a lottery. Nerd Watcher makes sure you never miss your ticket.

developer: Sierra6
website: https://github.com/Sierra6Secure/umbrelos-store
submitter: Sierra6
submission: 2026-03-04
repo: https://github.com/Sierra6Secure/umbrelos-store
support: https://github.com/Sierra6Secure/umbrelos-store/issues
gallery:
  - https://raw.githubusercontent.com/Sierra6Secure/umbrelos-store/main/sierra6-nerd-watcher/img/3.png
  - https://raw.githubusercontent.com/Sierra6Secure/umbrelos-store/main/sierra6-nerd-watcher/img/1.png
  - https://raw.githubusercontent.com/Sierra6Secure/umbrelos-store/main/sierra6-nerd-watcher/img/2.png
releaseNotes: >-
  v1.1.0

  - Bitcoin Node declared as a formal dependency — RPC credentials are now
    injected automatically by Umbrel. Zero manual configuration required on
    a standard Umbrel install.

  - Added Node Settings modal (gear icon in nav) for manual RPC configuration
    on non-Umbrel or custom installs. Settings persist across restarts.

  - Mobile responsive fixes — miner cards now render correctly on phones.
    Collapsible Block Activity canvas on mobile. Floating Add Worker button.

dependencies:
  - bitcoin
path: ""
defaultUsername: ""
defaultPassword: ""
