<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerd Watcher | Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #060708; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .glass-panel {
            background: rgba(15, 17, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7);
        }

        .block-grid {
            display: grid;
            gap: 3px;
            width: 100%;
            height: 100%;
            padding: 8px;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.01);
            aspect-ratio: 1/1;
            position: relative;
        }

        .block-id-tag {
            position: absolute;
            top: 4px;
            left: 4px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 8px;
            font-family: 'JetBrains Mono';
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        #visualizer-grid {
            display: grid;
            gap: 12px;
            align-content: center;
        }

        .pixel {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pool-emerald .pixel.active { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .pool-emerald .pixel.pending { border: 1px solid rgba(16, 185, 129, 0.3); animation: breathe-emerald 2s infinite; }
        .pool-blue .pixel.active { background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .pool-blue .pixel.pending { border: 1px solid rgba(59, 130, 246, 0.3); animation: breathe-blue 2s infinite; }
        .pool-purple .pixel.active { background: #a855f7; box-shadow: 0 0 10px #a855f7; }
        .pool-purple .pixel.pending { border: 1px solid rgba(168, 85, 247, 0.3); animation: breathe-purple 2s infinite; }

        @keyframes breathe-emerald { 0%, 100% { background: rgba(16, 185, 129, 0.05); } 50% { background: rgba(16, 185, 129, 0.4); } }
        @keyframes breathe-blue { 0%, 100% { background: rgba(59, 130, 246, 0.05); } 50% { background: rgba(59, 130, 246, 0.4); } }
        @keyframes breathe-purple { 0%, 100% { background: rgba(168, 85, 247, 0.05); } 50% { background: rgba(168, 85, 247, 0.4); } }

        .led-green { box-shadow: 0 0 10px #10b981, 0 0 20px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="min-h-screen p-6 lg:p-12">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-16">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-2xl">
                <div class="w-5 h-5 border-4 border-black rounded-sm transform rotate-45"></div>
            </div>
            <div>
                <span class="text-xl font-bold tracking-tight uppercase block leading-none">Nerd Watcher</span>
                <span class="text-[10px] text-gray-500 font-mono tracking-widest uppercase">v0.1.0-STABLE</span>
            </div>
        </div>
        <div class="flex gap-4">
            <button id="btn-add-miner" class="bg-white text-black px-6 py-2.5 rounded-full text-xs font-bold hover:bg-gray-200 transition-all flex items-center gap-2">
                <span>+</span> ADD MINER
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-panel rounded-[2rem] p-8 flex flex-col">
                <div class="grid grid-cols-2 gap-4 border-b border-white/5 pb-8 mb-8">
                    <div class="col-span-2 mb-4 border-b border-white/5 pb-4">
                        <p class="text-[10px] text-emerald-500 uppercase font-black tracking-[0.2em] mb-1">Swarm Hashrate</p>
                        <p class="text-3xl font-mono font-bold"><span id="total-hashrate">0.0</span> <span class="text-sm text-gray-600 font-medium">KH/s</span></p>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Shares Accepted</p>
                        <p id="stat-shares-accepted" class="text-xl font-mono">14,209</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Block Difficulty</p>
                        <p id="stat-block-difficulty" class="text-xl font-mono">81.7T</p>
                    </div>
                </div>
                <div class="mb-10">
                    <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-500 mb-2">Live Block Progress</h2>
                </div>
                <div id="visualizer-grid"></div>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-6">
            <div class="flex items-center gap-4 mb-2 px-2">
                <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-500">Fleet Control</h2>
                <div class="h-[1px] flex-1 bg-white/5"></div>
                <span id="active-device-count" class="text-xs font-mono text-green-500">1 Device Online</span>
            </div>

            <div id="miner-swarm-container" class="space-y-6"></div>

            <div id="btn-provision-hardware" class="border-2 border-dashed border-white/[0.03] rounded-[2.5rem] p-12 flex flex-col items-center justify-center text-gray-700 hover:text-gray-400 hover:border-white/10 transition-all cursor-pointer">
                <div class="text-2xl mb-2 font-light">+</div>
                <p class="text-[10px] font-bold uppercase tracking-[0.2em]">Provision Hardware</p>
            </div>
        </div>
    </main>

    <footer class="max-w-7xl mx-auto mt-20 flex flex-wrap gap-12 border-t border-white/5 pt-10 opacity-50">
        <div><p class="text-[10px] font-bold uppercase tracking-widest mb-1">Bitcoin Price</p><p id="global-btc-price" class="font-mono text-sm">$64,102.50</p></div>
        <div><p class="text-[10px] font-bold uppercase tracking-widest mb-1">Next Halving</p><p id="global-halving-eta" class="font-mono text-sm">April 2028</p></div>
        <div><p class="text-[10px] font-bold uppercase tracking-widest mb-1">Sats/vB</p><p id="global-network-fees" class="font-mono text-sm">18 (Medium)</p></div>
    </footer>

    <script>
        const poolColors = { 'public-pool.io': '#10b981', 'braiins.com': '#3b82f6', 'slushpool.com': '#a855f7' };
        const poolClasses = { 'public-pool.io': 'pool-emerald', 'braiins.com': 'pool-blue', 'slushpool.com': 'pool-purple' };

        let miners = [
            { id: 1, name: 'NerdMiner_01', ip: '192.168.1.42', pool: 'public-pool.io', hashrate: 78.4, freq: 240, volt: 1.18, temp: 54, vr_temp: 58, best_diff: "1.4T", curr_diff: "81.7T" }
        ];

        function deleteMiner(id) {
            miners = miners.filter(m => m.id !== id);
            renderAll();
        }

        function renderAll() {
            const container = document.getElementById('miner-swarm-container');
            const gridContainer = document.getElementById('visualizer-grid');
            const totalHashDisplay = document.getElementById('total-hashrate');
            
            container.innerHTML = '';
            gridContainer.innerHTML = '';

            const count = miners.length;
            document.getElementById('active-device-count').innerText = `${count} Device${count !== 1 ? 's' : ''} Online`;

            const swarmHash = miners.reduce((acc, m) => acc + m.hashrate, 0).toFixed(1);
            totalHashDisplay.innerText = swarmHash;

            let displayCols = count <= 1 ? 1 : (count <= 6 ? 2 : (count <= 12 ? 3 : 4));
            gridContainer.style.gridTemplateColumns = `repeat(${displayCols}, 1fr)`;
            let pixelsPerSide = count <= 1 ? 16 : (count <= 4 ? 12 : (count <= 9 ? 8 : 6));

            miners.forEach(miner => {
                const poolColor = poolColors[miner.pool] || '#10b981';
                const card = document.createElement('div');
                card.className = 'glass-panel p-8 rounded-[2rem] hover:border-white/20 transition-all duration-500 relative group';
                card.innerHTML = `
                    <button onclick="deleteMiner(${miner.id})" class="absolute top-6 right-6 text-gray-600 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    
                    <div class="grid grid-cols-12 gap-8 items-center">
                        <div class="col-span-3 space-y-4">
                            <div class="flex items-center gap-4">
                                <div class="w-3 h-3 rounded-full bg-emerald-500 led-green"></div>
                                <h3 class="text-2xl font-black tracking-tighter italic uppercase">${miner.name}</h3>
                            </div>
                            <p class="text-[10px] font-mono text-gray-500 tracking-[0.3em] uppercase">${miner.ip}</p>
                            <div class="flex items-center gap-2 pt-2 border-t border-white/5">
                                <div class="w-1.5 h-1.5 rounded-full" style="background-color: ${poolColor}"></div>
                                <span class="text-[9px] font-mono text-gray-500 italic truncate uppercase">${miner.pool}</span>
                            </div>
                        </div>

                        <div class="col-span-3 border-l border-white/5 pl-8 space-y-4">
                            <div>
                                <p class="text-[9px] text-gray-500 uppercase font-black tracking-widest mb-1">Best Difficulty</p>
                                <p class="text-xl font-mono font-bold text-white">${miner.best_diff}</p>
                            </div>
                            <div>
                                <p class="text-[9px] text-gray-500 uppercase font-black tracking-widest mb-1">Current Difficulty</p>
                                <p class="text-xl font-mono font-bold text-white">${miner.curr_diff}</p>
                            </div>
                        </div>

                        <div class="col-span-6 grid grid-cols-3 gap-y-6 gap-x-8 border-l border-white/5 pl-8">
                            <div class="col-span-3">
                                <p class="text-[9px] font-black text-emerald-500 uppercase tracking-widest mb-1">Real-time Hashrate</p>
                                <p class="text-5xl font-mono font-black">${miner.hashrate.toFixed(1)}<span class="text-xs text-gray-600 font-medium ml-2 uppercase">KH/s</span></p>
                            </div>
                            <div>
                                <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-1">Frequency</p>
                                <p class="text-2xl font-mono font-bold">${miner.freq}<span class="text-[10px] text-gray-600 ml-1">MHz</span></p>
                            </div>
                            <div>
                                <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-1">ASIC Temp</p>
                                <p class="text-2xl font-mono font-bold">${miner.temp}<span class="text-[10px] text-gray-600 ml-1">°C</span></p>
                            </div>
                            <div>
                                <p class="text-[9px] font-black text-red-500 uppercase tracking-widest mb-1">VR Temp</p>
                                <p class="text-2xl font-mono font-bold">${miner.vr_temp}<span class="text-[10px] text-gray-600 ml-1">°C</span></p>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                const block = document.createElement('div');
                const poolClass = poolClasses[miner.pool] || 'pool-emerald';
                block.className = `block-grid ${poolClass}`;
                block.style.gridTemplateColumns = `repeat(${pixelsPerSide}, 1fr)`;
                
                const idTag = document.createElement('div');
                idTag.className = 'block-id-tag';
                idTag.innerText = miner.name.toUpperCase();
                block.appendChild(idTag);
                
                for (let i = 0; i < pixelsPerSide * pixelsPerSide; i++) {
                    const p = document.createElement('div');
                    const rand = Math.random();
                    if (rand > 0.90) p.className = 'pixel active'; 
                    else if (rand > 0.70) p.className = 'pixel pending'; 
                    else p.className = 'pixel';
                    block.appendChild(p);
                }
                gridContainer.appendChild(block);
            });
        }

        document.getElementById('btn-provision-hardware').addEventListener('click', () => {
            const pools = ['public-pool.io', 'braiins.com', 'slushpool.com'];
            const p = pools[Math.floor(Math.random() * pools.length)];
            const id = Date.now();
            miners.push({
                id: id,
                name: `Nerd_${miners.length + 1}`,
                ip: `192.168.1.${Math.floor(Math.random() * 255)}`,
                pool: p,
                hashrate: (Math.random() * 20 + 70),
                freq: 240, volt: 1.18, temp: 54, vr_temp: 58,
                best_diff: "1.2T", curr_diff: "81.7T"
            });
            renderAll();
        });

        renderAll();
    </script>
</body>
</html>
