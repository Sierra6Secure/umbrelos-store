<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerd Watcher | Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #060708; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Modern Glass Effect */
        .glass-panel {
            background: rgba(15, 17, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7);
        }

        /* Block Visualizer Grid */
        .block-grid {
            display: grid;
            gap: 3px;
            width: 100%;
            height: 100%;
            padding: 8px;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1); /* The border around each block */
            background: rgba(255, 255, 255, 0.01);
            aspect-ratio: 1/1;
        }

        /* Container for multiple blocks */
        #visualizer-grid {
            display: grid;
            gap: 12px;
            align-content: center;
        }

        .pixel {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Pool Accent Colors */
        .pool-emerald .pixel.active { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .pool-blue .pixel.active { background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .pool-purple .pixel.active { background: #a855f7; box-shadow: 0 0 10px #a855f7; }

        .pixel.pending {
            animation: breathe 2s infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.4; }
        }

        /* Glowing Status LED */
        .led-green { box-shadow: 0 0 10px #10b981, 0 0 20px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="min-h-screen p-6 lg:p-12">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-16">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-2xl">
                <div class="w-5 h-5 border-4 border-black rounded-sm transform rotate-45"></div>
            </div>
            <div>
                <span class="text-xl font-bold tracking-tight uppercase block leading-none">Nerd Watcher</span>
                <span class="text-[10px] text-gray-500 font-mono tracking-widest uppercase">v0.1.0-STABLE</span>
            </div>
        </div>
        <div class="flex gap-4">
            <button id="btn-add-miner" class="bg-white text-black px-6 py-2.5 rounded-full text-xs font-bold hover:bg-gray-200 transition-all flex items-center gap-2">
                <span>+</span> ADD MINER
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-panel rounded-[2rem] p-8 flex flex-col">
                <div class="grid grid-cols-2 gap-4 border-b border-white/5 pb-8 mb-8">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Shares Accepted</p>
                        <p id="stat-shares-accepted" class="text-xl font-mono">14,209</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Block Difficulty</p>
                        <p id="stat-block-difficulty" class="text-xl font-mono">81.7T</p>
                    </div>
                </div>

                <div class="mb-10">
                    <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-500 mb-2">Live Block Progress</h2>
                    <p id="current-block-height" class="text-2xl font-semibold italic">Individual Tasking</p>
                </div>

                <div id="visualizer-grid">
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-6">
            <div class="flex items-center gap-4 mb-2 px-2">
                <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-500">Swarm</h2>
                <div class="h-[1px] flex-1 bg-white/5"></div>
                <span id="active-device-count" class="text-xs font-mono text-green-500">1 Device Online</span>
            </div>

            <div id="miner-swarm-container" class="space-y-6">
                </div>

            <div id="btn-provision-hardware" class="border-2 border-dashed border-white/[0.03] rounded-[2.5rem] p-12 flex flex-col items-center justify-center text-gray-700 hover:text-gray-400 hover:border-white/10 transition-all cursor-pointer">
                <div class="text-2xl mb-2 font-light">+</div>
                <p class="text-[10px] font-bold uppercase tracking-[0.2em]">Provision Hardware</p>
            </div>
        </div>
    </main>

    <footer class="max-w-7xl mx-auto mt-20 flex flex-wrap gap-12 border-t border-white/5 pt-10 opacity-50">
        <div>
            <p class="text-[10px] font-bold uppercase tracking-widest mb-1">Bitcoin Price</p>
            <p id="global-btc-price" class="font-mono text-sm">$64,102.50</p>
        </div>
        <div>
            <p class="text-[10px] font-bold uppercase tracking-widest mb-1">Next Halving</p>
            <p id="global-halving-eta" class="font-mono text-sm">April 2028</p>
        </div>
        <div>
            <p class="text-[10px] font-bold uppercase tracking-widest mb-1">Sats/vB</p>
            <p id="global-network-fees" class="font-mono text-sm">18 (Medium)</p>
        </div>
    </footer>

    <script>
        const poolColors = {
            'public-pool.io': 'pool-emerald',
            'braiins.com': 'pool-blue',
            'slushpool.com': 'pool-purple'
        };

        // Initial Data
        let miners = [
            { id: 1, name: 'NerdMiner_01', ip: '192.168.1.42', pool: 'public-pool.io' }
        ];

        function deleteMiner(id) {
            miners = miners.filter(m => m.id !== id);
            renderAll();
        }

        function renderAll() {
            const container = document.getElementById('miner-swarm-container');
            const gridContainer = document.getElementById('visualizer-grid');
            container.innerHTML = '';
            gridContainer.innerHTML = '';

            const count = miners.length;
            document.getElementById('active-device-count').innerText = `${count} Device${count !== 1 ? 's' : ''} Online`;

            // Calculate grid for multiple blocks
            let displayCols = count <= 1 ? 1 : (count <= 6 ? 2 : (count <= 12 ? 3 : 4));
            gridContainer.style.gridTemplateColumns = `repeat(${displayCols}, 1fr)`;

            // Inverse Scaling Resolution
            let pixelsPerSide = count <= 1 ? 16 : (count <= 4 ? 12 : (count <= 9 ? 8 : 6));

            miners.forEach(miner => {
                // 1. Render Miner Card
                const card = document.createElement('div');
                card.className = 'glass-panel p-8 rounded-[2.5rem] hover:border-white/20 transition-all duration-500 relative group';
                card.innerHTML = `
                    <button onclick="deleteMiner(${miner.id})" class="absolute top-6 right-6 text-gray-500 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <div class="flex flex-col md:flex-row justify-between items-start gap-8">
                        <div class="flex-1 space-y-6">
                            <div class="flex items-center gap-4">
                                <div class="w-3 h-3 rounded-full bg-emerald-500 led-green"></div>
                                <div>
                                    <h3 class="text-2xl font-bold tracking-tight italic">${miner.name}</h3>
                                    <p class="text-xs font-mono text-gray-500 tracking-wider">IP: ${miner.ip}</p>
                                </div>
                            </div>
                            <div class="bg-white/[0.03] rounded-2xl p-4 border border-white/5">
                                <div class="flex items-center gap-3 mb-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
                                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Active Pool</p>
                                </div>
                                <p class="text-sm font-mono text-white mb-1 truncate">${miner.pool}</p>
                                <p class="text-[10px] font-mono text-gray-500">Worker: bc1q...xy7z</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-x-12 gap-y-6 text-right md:text-left">
                            <div>
                                <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1">Hashrate</p>
                                <p class="text-3xl font-mono font-bold">78.4 <span class="text-sm text-gray-600 font-normal">KH/s</span></p>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-orange-500 uppercase tracking-widest mb-1">Thermal</p>
                                <p class="text-3xl font-mono font-bold">54<span class="text-sm text-gray-600 font-normal">°C</span></p>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                // 2. Render Scaling Block
                const block = document.createElement('div');
                const poolClass = poolColors[miner.pool] || 'pool-emerald';
                block.className = `block-grid ${poolClass}`;
                block.style.gridTemplateColumns = `repeat(${pixelsPerSide}, 1fr)`;
                
                for (let i = 0; i < pixelsPerSide * pixelsPerSide; i++) {
                    const p = document.createElement('div');
                    const rand = Math.random();
                    p.className = 'pixel' + (rand > 0.88 ? ' active' : rand > 0.75 ? ' pending' : '');
                    block.appendChild(p);
                }
                gridContainer.appendChild(block);
            });
        }

        // Add Miner listener
        document.getElementById('btn-provision-hardware').addEventListener('click', () => {
            const pools = ['public-pool.io', 'braiins.com', 'slushpool.com'];
            const id = Date.now();
            miners.push({
                id: id,
                name: `Nerd_${miners.length + 1}`,
                ip: `192.168.1.${Math.floor(Math.random() * 255)}`,
                pool: pools[Math.floor(Math.random() * pools.length)]
            });
            renderAll();
        });

        // Initialize
        renderAll();
    </script>
</body>
</html>
