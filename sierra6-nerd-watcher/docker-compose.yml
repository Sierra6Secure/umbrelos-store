version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: sierra6-nerd-watcher_web_1
      APP_PORT: 5005
      PROXY_AUTH_WHITELIST: "/api/widget/*"

  web:
    image: ghcr.io/sierra6secure/nerdwatcher-ui:latest
    restart: on-failure
    stop_grace_period: 2s
    networks:
      - umbrel_main_network
    ports:
      - "5005:5005"
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      - PORT=5005
      # Injected automatically by Umbrel when bitcoin is listed as a dependency.
      # Falls back gracefully to config.json or hardcoded defaults if not present.
      - APP_BITCOIN_NODE_IP=${APP_BITCOIN_NODE_IP:-10.21.0.1}
      - APP_BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT:-8332}
      - APP_BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER:-umbrel}
      - APP_BITCOIN_RPC_PASS=${APP_BITCOIN_RPC_PASS:-}

networks:
  umbrel_main_network:
    external: true
