
version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: sierra6-stash-manager_app_1
      APP_PORT: 6005
      PROXY_AUTH_WHITELIST: "/api/*"

  app:
    image: ghcr.io/sierra6secure/stashmanager-ui:latest
    restart: on-failure
    stop_grace_period: 2s
    networks:
      - umbrel_main_network
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      - PORT=6005

networks:
  umbrel_main_network:
    external: true